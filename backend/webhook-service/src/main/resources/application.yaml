spring:
  application:
    name: webhook-service

  datasource:
    url: jdbc:postgresql://localhost:5432/prlens
    username: prlens
    password: prlens
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics